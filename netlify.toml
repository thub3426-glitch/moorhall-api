# =============================================================================
# PRISMA + POSTGRESQL CONFIGURATION
# =============================================================================
# 
# Database Connection for Netlify Functions:
# - Each function invocation is a separate Node.js process
# - Prisma client initializes on first database call
# - Connection pooling via database URL parameters is CRITICAL
# 
# DATABASE_URL Format:
# postgresql://username:password@host:port/database?schema=public&sslmode=require&pool_size=2&connection_limit=2
# 
# Key Parameters:
# - sslmode=require: Required for cloud databases (security)
# - pool_size=2: Connections per pool (important for serverless)
# - connection_limit=2: Maximum connections (prevents exhaustion)
# - schema=public: Target schema (adjust if using multiple schemas)
# 
# Connection Pooling Recommendations:
# - Use PgBouncer, Supabase connection pooling, or Railway managed pooling
# - Netlify Functions can have ~10s execution windows before cold start penalty
# - Never use unbounded connection pools with serverless
#
# Building with Prisma on Netlify:
# - DATABASE_URL MUST be set during build (for Prisma client generation)
# - Use a read-only database URL or create a separate build account with limited permissions
# - The build command includes: npm run db:generate
# 
